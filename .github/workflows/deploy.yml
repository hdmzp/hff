# GitHub Pages 배포 + 매일 데이터 자동 갱신
#
# 최초 설정 (저장소에서 1회):
#   1. Settings → Pages → Source 를 "GitHub Actions" 로 변경
#   2. Settings → Secrets and variables → Actions → Secrets 에 FOODSAFETY_API_KEY 추가
#   3. (선택) 같은 화면의 Variables 에 FSK_SERVICE_INDIVIDUAL / FSK_SERVICE_PRODUCT /
#      FSK_SERVICE_NUTRITION 추가 — scripts/test-api.mjs 로 찾은 serviceId
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 20 * * *" # 매일 05:00 KST 데이터 갱신 후 재배포
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch data from Food Safety Korea API
        run: node scripts/fetch-data.mjs
        env:
          FOODSAFETY_API_KEY: ${{ secrets.FOODSAFETY_API_KEY }}
          FSK_SERVICE_INGREDIENT: ${{ vars.FSK_SERVICE_INGREDIENT || 'I2820' }}
          FSK_SERVICE_INDIVIDUAL: ${{ vars.FSK_SERVICE_INDIVIDUAL }}
          FSK_SERVICE_PRODUCT: ${{ vars.FSK_SERVICE_PRODUCT }}
          FSK_SERVICE_NUTRITION: ${{ vars.FSK_SERVICE_NUTRITION }}

      - name: Build static site
        run: npm run build
        env:
          # 저장소 이름이 바뀌어도 Pages 경로(https://<계정>.github.io/<저장소>/)를 자동 반영
          BASE_PATH: /${{ github.event.repository.name }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
